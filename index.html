<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Charles Game Dev</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <!--hi-->
  <body>
    <div class="page">
      <h1 style="font-size: 6em;">Charles Game Dev</h1>
      <span id="mobile-warning" style="display: none;" class="mobile-warning">My games aren't playable on mobiles at the moment.<br>I will try to get some games out for mobiles when I get the chance.</span>
      <h1>Mainline games</h1>
      <br><br><br><br>
      <section>
        <button class="game" id="skyfall" onmouseenter="onHover(this)" onmouseleave="resetBackground()" onclick="redirect('https://skyfall-game.github.io')" style="background-image: url(/games/skyfall/image.png);">
        <button class="game" id="roofy" onmouseenter="onHover(this)" onmouseleave="resetBackground()" onclick="redirect('/games/roofy')" style="background-image: url(games/roofy/icon.png);">
        <button class="game" id="indiguns" onmouseenter="onHover(this)"  onmouseleave="resetBackground()" onclick="redirect('/games/indiguns/')" style="background-image: url(games/indiguns/icon.png);">
      </section>
      <br><br><br><br>
      <h1>Other games</h1>
      <img class="centered" src="/img/thanks-jonathan.png">
      <br><br><br><br><br><br>
      <section>
        <button class="game" id="physics" onmouseenter="onHover(this)" onmouseleave="resetBackground()" onclick="redirect('/games/physics/')">
        <button class="game" id="gameup" onmouseenter="onHover(this)"  onmouseleave="resetBackground()" onclick="redirect('/games/gameup')" style="background-image: url(games/gameup/image.jpg);">
        <button class="game" id="tetris" onmouseenter="onHover(this)"  onmouseleave="resetBackground()" onclick="redirect('/games/tetris/')" style="background-image: url(games/tetris/icon.png);">
      </section>
      <br><br><br><br><br><br>
      <section>
        <button class="game" id="tetris2d" onmouseenter="onHover(this)" onmouseleave="resetBackground()" onclick="redirect('/games/tetris2d/')" style="background-image: url(games/tetris2d/image.png);"></button>
        <button class="game" id="minesweeper" onmouseenter="onHover(this)" onmouseleave="resetBackground()" onclick="redirect('/games/minesweeper/')"  style="background-image: url(games/minesweeper/icon.png)"></button>
      </section>
    </div>
    
    <script src="js/index.js"></script>
